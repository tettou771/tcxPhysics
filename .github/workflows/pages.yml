# =============================================================================
# Build the example-cubeRain WebAssembly demo and publish it to GitHub Pages
# via the Actions artifact pipeline — NO build output is committed to git.
#
# Pages "Source" must be set to "GitHub Actions" (Settings > Pages), which this
# repo is configured for. The live URL stays https://tettou771.github.io/tcxPhysics/
# =============================================================================
name: Deploy web demo to Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'example-cubeRain/**'
      - 'CMakeLists.txt'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout addon
        uses: actions/checkout@v4

      - name: Clone TrussC
        run: git clone --depth 1 --branch main https://github.com/TrussC-org/TrussC.git TrussC

      - name: Link addon into TrussC
        run: ln -s "$GITHUB_WORKSPACE" "TrussC/addons/tcxPhysics"

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          # Pinned to 5.0.4 (matches local dev). emscripten 6.0.0's emdawnwebgpu
          # runtime triggers "wgpu: device lost" on iOS/iPadOS Safari WebGPU
          # (black screen after one frame); 5.0.4 runs fine there.
          version: 5.0.4
          actions-cache-folder: emsdk-cache

      # Cache the example's web build dir so Jolt's wasm objects (FetchContent
      # _deps) survive across runs — keyed on the Jolt tag in CMakeLists.txt.
      - name: Cache web build
        uses: actions/cache@v4
        with:
          path: TrussC/addons/tcxPhysics/example-cubeRain/build-web
          key: pages-webbuild-${{ hashFiles('CMakeLists.txt') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            pages-webbuild-${{ hashFiles('CMakeLists.txt') }}-

      - name: Configure & build (Emscripten / WebGPU)
        working-directory: TrussC/addons/tcxPhysics/example-cubeRain
        run: |
          set -e
          # The example's CMakeLists.txt is normally generated by trusscli and is
          # gitignored, so write the standard one here (reads addons.make + src/).
          cat > CMakeLists.txt <<'CMAKE'
          cmake_minimum_required(VERSION 3.20)
          project(example-cubeRain)
          if(NOT DEFINED TRUSSC_DIR)
              set(TRUSSC_DIR "${CMAKE_CURRENT_SOURCE_DIR}/../../../core")
          endif()
          include(${TRUSSC_DIR}/cmake/trussc_app.cmake)
          trussc_app()
          CMAKE
          emcmake cmake -B build-web \
            -DTRUSSC_DIR="$GITHUB_WORKSPACE/TrussC/core" \
            -DTC_WEB_BACKEND=WGPU \
            -DCMAKE_BUILD_TYPE=MinSizeRel
          cmake --build build-web --parallel

      - name: Assemble Pages site
        working-directory: TrussC/addons/tcxPhysics/example-cubeRain
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/_site"
          cp bin/example-cubeRain.js bin/example-cubeRain.wasm "$GITHUB_WORKSPACE/_site/"
          python3 - bin/example-cubeRain.html "$GITHUB_WORKSPACE/_site/index.html" <<'PY'
          import sys
          src, dst = sys.argv[1], sys.argv[2]
          html = open(src).read()
          link = ('<a href="https://github.com/tettou771/tcxPhysics" target="_blank" '
                  'style="position:absolute;top:8px;right:10px;z-index:10;color:#aaa;'
                  'font-family:sans-serif;font-size:12px;text-decoration:none">tcxPhysics ↗</a>')
          # On-device console: append ?debug to the URL to load eruda (an
          # on-screen JS console). Lets us read logs/errors on iPad/iPhone with
          # no Mac. Off by default so normal visitors never see it.
          debug = ('<script>if(/[?&]debug/.test(location.search)){'
                   'var s=document.createElement("script");'
                   's.src="https://cdn.jsdelivr.net/npm/eruda";'
                   's.onload=function(){eruda.init();'
                   'console.log("devicePixelRatio="+window.devicePixelRatio+'
                   '" inner="+innerWidth+"x"+innerHeight);};'
                   'document.head.appendChild(s);}</script>')
          html = html.replace('<body>', '<body>' + link + debug, 1)
          html = html.replace('{{{ TITLE }}}', 'tcxPhysics — cubeRain (Jolt Physics)')
          open(dst, 'w').write(html)
          print('index.html assembled')
          PY
          touch "$GITHUB_WORKSPACE/_site/.nojekyll"
          ls -la "$GITHUB_WORKSPACE/_site"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
